name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          $pythonLocation/bin/python -m pip install -r requirements.txt
          $pythonLocation/bin/python -m pip install -r app/requirements.txt
          $pythonLocation/bin/python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: $pythonLocation/bin/python -m pytest tests/ -v
