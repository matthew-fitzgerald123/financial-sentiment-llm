name: Eval

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: macos-14  # M1, mlx-lm requires Apple Silicon
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r app/requirements.txt

      - name: Prepare dataset
        run: python data/prepare.py

      - name: Restore adapter cache
        uses: actions/cache@v4
        id: adapter-cache
        with:
          path: mistral-finetuned/
          key: adapter-${{ hashFiles('lora_config.yaml') }}

      - name: Run evaluation
        run: python eval/eval.py
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            eval/results.json
            eval/summary.json
          retention-days: 30

      - name: Gate on ROUGE-L threshold
        run: |
          python - <<'EOF'
          import json, sys
          with open("eval/summary.json") as f:
              s = json.load(f)
          rougeL = s["ft_rougeL"]
          label_acc = s["label_accuracy_finetuned"]
          print(f"avg fine-tuned ROUGE-L:    {rougeL:.3f}")
          print(f"fine-tuned label accuracy: {label_acc:.3f}")
          failed = False
          if rougeL < 0.85:
              print("FAIL: ROUGE-L below 0.85 threshold")
              failed = True
          if label_acc < 0.80:
              print("FAIL: label accuracy below 0.80 threshold")
              failed = True
          if failed:
              sys.exit(1)
          print("PASS")
          EOF
