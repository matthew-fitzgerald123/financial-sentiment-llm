name: Eval

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: macos-14  # M1, mlx-lm requires Apple Silicon
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          $pythonLocation/bin/python -m pip install -r requirements.txt
          $pythonLocation/bin/python -m pip install -r app/requirements.txt

      - name: Prepare dataset
        run: $pythonLocation/bin/python data/prepare.py

      - name: Restore adapter cache
        uses: actions/cache@v4
        id: adapter-cache
        with:
          path: mistral-finetuned/
          key: adapter-${{ hashFiles('lora_config.yaml') }}

      - name: Run evaluation
        run: $pythonLocation/bin/python eval/eval.py
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            eval/results.json
            eval/summary.json
          retention-days: 30

      - name: Gate on ROUGE-L threshold
        run: |
          $pythonLocation/bin/python - <<'EOF'
          import json, sys
          with open("eval/summary.json") as f:
              s = json.load(f)
          print(f"avg fine-tuned ROUGE-L:    {s['ft_rougeL']:.3f}")
          print(f"fine-tuned label accuracy: {s['label_accuracy_finetuned']:.3f}")
          failed = False
          if not s["ft_rougeL_gate_passed"]:
              print("FAIL: ROUGE-L gate not passed")
              failed = True
          if not s["label_accuracy_gate_passed"]:
              print("FAIL: label accuracy gate not passed")
              failed = True
          if failed:
              sys.exit(1)
          print("PASS")
          EOF

      - name: Run OOD evaluation (informational)
        run: $pythonLocation/bin/python eval/eval.py --data data/ood_sample.jsonl --n 10 --no-gate
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"

      - name: Upload OOD eval results
        uses: actions/upload-artifact@v4
        with:
          name: ood-eval-results-${{ github.sha }}
          path: |
            eval/results.json
            eval/summary.json
          retention-days: 30
