name: Eval

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: macos-14  # M1, mlx-lm requires Apple Silicon
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          $pythonLocation/bin/python -m pip install -r requirements.txt
          $pythonLocation/bin/python -m pip install -r app/requirements.txt

      - name: Prepare dataset
        run: $pythonLocation/bin/python data/prepare.py

      - name: Restore adapter cache
        uses: actions/cache@v4
        id: adapter-cache
        with:
          path: mistral-finetuned/
          key: adapter-${{ hashFiles('lora_config.yaml') }}

      - name: Run evaluation
        run: $pythonLocation/bin/python eval/eval.py
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            eval/results.json
            eval/summary.json
          retention-days: 30

      - name: Gate on eval quality thresholds
        run: |
          $pythonLocation/bin/python - <<'EOF'
          import json, sys
          with open("eval/summary.json") as f:
              s = json.load(f)
          rouge_passed = s["ft_rougeL_gate_passed"]
          label_passed = s["label_accuracy_gate_passed"]
          print(f"avg fine-tuned ROUGE-L:    {s['ft_rougeL']:.3f}  ({'PASS' if rouge_passed else 'FAIL'})")
          print(f"fine-tuned label accuracy: {s['label_accuracy_finetuned']:.3f}  ({'PASS' if label_passed else 'FAIL'})")
          if not rouge_passed or not label_passed:
              sys.exit(1)
          print("PASS")
          EOF

      - name: Run OOD evaluation (informational)
        run: |
          $pythonLocation/bin/python eval/eval.py \
            --data data/ood_sample.jsonl \
            --n 10 \
            --no-gate \
            --output-results eval/ood_results.json \
            --output-summary eval/ood_summary.json
        env:
          HF_HUB_ENABLE_HF_TRANSFER: "1"

      - name: Upload OOD eval results
        uses: actions/upload-artifact@v4
        with:
          name: ood-eval-results-${{ github.sha }}
          path: |
            eval/ood_results.json
            eval/ood_summary.json
          retention-days: 30
